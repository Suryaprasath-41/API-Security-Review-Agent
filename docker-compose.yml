version: '3.8'

services:
  backend:
    build: .
    container_name: api_security_backend
    command: uvicorn app.backend_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: .
    container_name: api_security_frontend
    command: streamlit run app/frontend_dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
